<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Objav — Brownfieldy Bratislava</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<style>
@font-face{font-family:"Overused Grotesk";src:url("./fonts/OverusedGrotesk-VF.woff2") format("woff2");font-weight:300 900;font-display:swap}
:root{--green:#3fd35a;--amber:#f4a93a;--blue:#4ec5f9;--violet:#9b7fe6;--grey:#9a97b3;--warm:#e4564f;--revit:#3ee06a;
--nav:#0a0d24;--panel:rgba(16,20,48,.9);--panel2:rgba(22,27,60,.96);--line:rgba(255,255,255,.1);--line2:rgba(255,255,255,.18);
--tx:#eef0ff;--dim:#a9adda;--faint:#6f74a6;--r:14px;--sh:0 24px 60px -18px rgba(0,0,0,.6)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--nav);font-family:"Overused Grotesk","Inter",system-ui,sans-serif;color:var(--tx);-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100%}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line);flex:none;z-index:10}
.logo{display:flex;align-items:center;gap:12px}.logo svg{width:32px;height:32px;stroke:#fff;fill:none;stroke-width:2}.logo b{font-size:13px;font-weight:700;letter-spacing:1px;line-height:1.05}
.menu{display:flex;gap:30px}.menu a{font-size:13px;letter-spacing:1.4px;font-weight:600;color:var(--dim);cursor:pointer;position:relative;padding:6px 0}
.menu a.on{color:#fff}.menu a.on::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:2px;background:var(--amber);border-radius:2px}
.main{flex:1;display:flex;min-height:0}
#map{flex:1;position:relative}
.maplibregl-ctrl-attrib,.maplibregl-ctrl-logo,.maplibregl-ctrl-bottom-right{display:none!important}
.right{width:400px;flex:none;border-left:1px solid var(--line);background:var(--nav);display:flex;flex-direction:column;position:relative}

/* overview */
.ov{display:flex;flex-direction:column;height:100%}
.search{padding:16px 18px 10px;flex:none}
.search .inp{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:11px;padding:11px 14px}
.search .inp svg{width:16px;height:16px;stroke:var(--faint);fill:none;stroke-width:2}
.search .inp input{background:none;border:0;outline:none;color:var(--tx);font-family:inherit;font-size:13.5px;width:100%}
.filters{padding:6px 18px 12px;display:flex;gap:7px;flex-wrap:wrap;flex:none;border-bottom:1px solid var(--line)}
.chip{font-size:12px;font-weight:560;color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:999px;padding:6px 12px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px}
.chip:hover{color:var(--tx)}.chip.on{background:var(--amber);color:#1a1730;border-color:transparent;font-weight:660}
.chip i{width:8px;height:8px;border-radius:50%}
.counthead{padding:12px 18px;font-size:12px;color:var(--dim);display:flex;justify-content:space-between;align-items:center;flex:none}
.counthead b{color:var(--tx);font-variant-numeric:tabular-nums}
.list{overflow-y:auto;flex:1;padding-bottom:70px}
.li{display:flex;gap:11px;align-items:flex-start;padding:12px 18px;border-bottom:1px solid var(--line);cursor:pointer;position:relative;transition:background .12s}
.li:hover{background:rgba(255,255,255,.035)}
.li.active{background:rgba(78,197,249,.1);box-shadow:inset 3px 0 0 var(--blue)}
.li .cb{width:18px;height:18px;border-radius:5px;border:1.6px solid var(--line2);flex:none;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.12s}
.li .cb.on{background:var(--amber);border-color:var(--amber);color:#1a1730}
.li .cb svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:3;display:none}.li .cb.on svg{display:block}
.li .d{width:9px;height:9px;border-radius:50%;margin-top:6px;flex:none}
.li .t{flex:1;min-width:0}
.li .t b{font-size:13.5px;font-weight:600;display:block}
.li .t span{font-size:11px;color:var(--faint);display:block;margin-top:2px}
.li .ha{font-size:12px;color:var(--dim);white-space:nowrap;font-variant-numeric:tabular-nums;margin-top:1px}
.li .proj{position:absolute;right:16px;bottom:10px;color:var(--amber);font-size:12px;display:none}
.li.projected .proj{display:block}
.li .cta{display:none;margin-top:8px;font-size:12px;font-weight:660;color:var(--blue)}
.li.active .cta{display:block}

/* selection bar */
.selbar{position:absolute;left:18px;bottom:16px;background:var(--panel2);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:12px;padding:12px 16px;box-shadow:var(--sh);display:none;align-items:center;gap:14px;z-index:8}
.selbar.on{display:flex}
.selbar .n{width:26px;height:26px;border-radius:8px;background:var(--amber);color:#1a1730;font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px}
.selbar b{font-size:13px}.selbar button{background:var(--indigo,#30287B);color:#fff;border:0;font-family:inherit;font-size:12.5px;font-weight:640;padding:8px 14px;border-radius:9px;cursor:pointer}

/* layers control */
.layerctl{position:absolute;top:16px;right:16px;z-index:8;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.lbtn{background:var(--panel);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:10px;color:var(--tx);font-family:inherit;font-size:12px;font-weight:600;padding:9px 13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.lbtn.on{border-color:var(--amber);color:var(--amber)}
.lbtn i{width:9px;height:9px;border-radius:2px}

/* detail */
.detail{position:absolute;inset:0;background:var(--nav);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.1,1);z-index:9}
.detail.show{transform:none}
.det-top{padding:14px 18px;border-bottom:1px solid var(--line);flex:none}
.back{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--dim);background:none;border:0;cursor:pointer;font-family:inherit}
.back:hover{color:var(--tx)}
.det-scroll{overflow-y:auto;flex:1;padding:18px 20px 30px}
.det-tag{font-size:11px;font-weight:640;padding:4px 11px;border-radius:999px}
.crit{background:rgba(228,86,79,.2);color:#ff9a94}.key{background:rgba(63,211,90,.2);color:#8ff0a0}.ok{background:rgba(255,255,255,.08);color:var(--dim)}
.det-name{font-size:24px;font-weight:660;letter-spacing:-.4px;margin:10px 0 3px}
.det-sub{font-size:12.5px;color:var(--dim);margin-bottom:12px}
.projbtn{width:100%;background:rgba(244,169,58,.14);border:1px solid rgba(244,169,58,.4);color:var(--amber);font-family:inherit;font-size:13.5px;font-weight:660;padding:13px;border-radius:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:16px}
.projbtn.done{background:rgba(63,211,90,.14);border-color:rgba(63,211,90,.4);color:var(--revit)}
.blk{border-top:1px solid var(--line);padding:14px 0}
.blk .l{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--faint);font-weight:700;margin-bottom:8px}
.blk .v{font-size:14px;font-weight:600}.blk p{font-size:13px;color:var(--dim);line-height:1.55}
.kv{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:5px 0}.kv .k{color:var(--dim)}.kv .vv{font-weight:620;text-align:right}
.photo{height:120px;border-radius:11px;margin:4px 0 8px;background:linear-gradient(135deg,#2a2f5e,#3d4585);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:12px}
/* timeline phases */
.phases{display:flex;gap:5px;background:rgba(0,0,0,.28);padding:4px;border-radius:10px;margin-bottom:12px}
.phases button{flex:1;border:0;background:none;color:var(--dim);font-family:inherit;font-size:12px;font-weight:560;padding:9px 0;border-radius:7px;cursor:pointer}
.phases button.on{background:var(--indigo,#30287B);color:#fff;font-weight:660}
.phasebox{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:11px;padding:14px 16px;min-height:96px}
.phasebox .yr{font-size:12px;color:var(--amber);font-weight:700;font-variant-numeric:tabular-nums}
.phasebox h4{font-size:15px;font-weight:640;margin:4px 0 6px}
.phasebox p{font-size:12.5px;color:var(--dim);line-height:1.5}
.cert{display:inline-block;font-size:10.5px;font-weight:640;padding:3px 9px;border-radius:999px;margin-top:9px;background:rgba(255,255,255,.08);color:var(--dim)}
.loader{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:var(--nav);color:var(--faint);font-size:13px;transition:.5s}
.loader.hide{opacity:0;pointer-events:none}
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="logo"><svg viewBox="0 0 40 40"><path d="M6 34V16l4-3 4 3v-4l6-4 6 4v4l4-3 4 3v18z"/><path d="M6 34h28"/></svg><b>BROWNFIELDY<br>BRATISLAVA</b></div>
    <div class="menu"><a>PULZ</a><a class="on">OBJAV</a><a>VÍZIA</a><a>O PROJEKTE</a></div>
    <div style="width:60px"></div>
  </nav>
  <div class="main">
    <div id="map">
      <div class="layerctl" id="layerctl"></div>
      <div class="selbar" id="selbar"><span class="n" id="sel-n">0</span><b>Vybrané na porovnanie</b><button id="sel-cmp">Porovnať →</button></div>
      <div class="loader" id="loader">Skladám mapu a 113 území…</div>
    </div>
    <div class="right">
      <!-- OVERVIEW -->
      <div class="ov" id="ov">
        <div class="search"><div class="inp"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="q" placeholder="Hľadať územie alebo mestskú časť…"></div></div>
        <div class="filters" id="filters"></div>
        <div class="counthead"><span><b id="cnt">113</b> z 113 území</span><span id="cnt-sub" style="color:var(--faint)">zoradiť: rozloha ↓</span></div>
        <div class="list" id="list"></div>
      </div>
      <!-- DETAIL -->
      <div class="detail" id="detail">
        <div class="det-top"><button class="back" id="back">‹ Späť na prehľad</button></div>
        <div class="det-scroll" id="det-scroll"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@4.4.1/dist/pmtiles.js"></script>
<script>
const C={green:'#3fd35a',amber:'#f4a93a',blue:'#4ec5f9',violet:'#9b7fe6',grey:'#9a97b3'};
const ownerColor=['match',['get','DRUH_VLA'],'MESTO',C.green,'SÚKROMNÍ VLASTNÍCI',C.amber,'MESTO A SÚKROMNÍ VLASTNÍCI',C.blue,'ŠTÁT',C.violet,C.grey];
const OWN={'MESTO':C.green,'SÚKROMNÍ VLASTNÍCI':C.amber,'MESTO A SÚKROMNÍ VLASTNÍCI':C.blue,'ŠTÁT':C.violet,'INÉ':C.grey};
const OWNL={'MESTO':'Mesto','SÚKROMNÍ VLASTNÍCI':'Súkromný vlastník','MESTO A SÚKROMNÍ VLASTNÍCI':'Mesto + súkromní','ŠTÁT':'Štát','INÉ':'Iné'};

if(window.pmtiles){try{maplibregl.addProtocol('pmtiles',new pmtiles.Protocol().tile);}catch(e){}}
const PM=location.href.replace(/[^/]*(\?.*)?$/,'')+'data/buildings.pmtiles';
const map=new maplibregl.Map({container:'map',style:{version:8,glyphs:'https://fonts.openmaptiles.org/{fontstack}/{range}.pbf',sources:{},layers:[{id:'bg',type:'background',paint:{'background-color':'#0a0d24'}}]},
  center:[17.12,48.15],zoom:11.7,pitch:48,bearing:-15,maxPitch:72,antialias:true,attributionControl:false});

let bf=null, S={q:'',owner:null,contam:false,big:false,highlighted:null,selected:[],projected:new Set(),view:'overview',saved:null};

function bbox(g){let x1=180,y1=90,x2=-180,y2=-90;const r=g.type==='Polygon'?g.coordinates:g.coordinates.flat();r.forEach(rr=>rr.forEach(([x,y])=>{x1=Math.min(x1,x);y1=Math.min(y1,y);x2=Math.max(x2,x);y2=Math.max(y2,y);}));return[[x1,y1],[x2,y2]];}
function ctr(g){const b=bbox(g);return[(b[0][0]+b[1][0])/2,(b[0][1]+b[1][1])/2];}
function get(id){return bf.features.find(f=>f.properties.OBJECTID===id);}

map.on('load',async()=>{
  try{map.addSource('bld',{type:'vector',url:'pmtiles://'+PM});
    map.addLayer({id:'city',type:'fill-extrusion',source:'bld','source-layer':'building',minzoom:10,
      paint:{'fill-extrusion-color':['interpolate',['linear'],['get','h'],0,'#232a55',40,'#313c74',100,'#3f4d8f'],'fill-extrusion-height':['get','h'],'fill-extrusion-base':['coalesce',['get','min'],0],'fill-extrusion-opacity':.92,'fill-extrusion-vertical-gradient':true}});}catch(e){}
  bf=await(await fetch('data/bf_real.geojson')).json();
  map.addSource('bf',{type:'geojson',data:bf,promoteId:'OBJECTID'});
  const s=14,cv=document.createElement('canvas');cv.width=cv.height=s;const cx=cv.getContext('2d');
  cx.fillStyle='rgba(228,86,79,.95)';[[4,4],[10,10]].forEach(([a,b])=>{cx.beginPath();cx.arc(a,b,1.7,0,7);cx.fill();});
  map.addImage('dots',cx.getImageData(0,0,s,s));
  map.addLayer({id:'bf-vol',type:'fill-extrusion',source:'bf',paint:{'fill-extrusion-color':ownerColor,
    'fill-extrusion-height':['interpolate',['linear'],['get','VYMERA_HA'],0.5,10,10,26,140,64],'fill-extrusion-base':0,
    'fill-extrusion-vertical-gradient':true,
    'fill-extrusion-opacity':['case',['boolean',['feature-state','active'],false],.95,['boolean',['feature-state','selected'],false],.85,['boolean',['feature-state','dim'],false],.16,['boolean',['feature-state','hover'],false],.85,.7]}});
  map.addLayer({id:'bf-line',type:'line',source:'bf',paint:{
    'line-color':['case',['boolean',['feature-state','projected'],false],'#fff',['boolean',['feature-state','selected'],false],'#fff',['boolean',['feature-state','active'],false],'#fff',ownerColor],
    'line-width':['case',['boolean',['feature-state','active'],false],2.6,['boolean',['feature-state','projected'],false],2.6,['boolean',['feature-state','selected'],false],2,['boolean',['feature-state','hover'],false],1.7,.9],
    'line-dasharray':['case',['boolean',['feature-state','selected'],false],['literal',[2,1.5]],['literal',[1,0]]],
    'line-opacity':.9}});
  map.addLayer({id:'bf-contam',type:'fill',source:'bf',filter:['==',['get','KONTAMIN'],'2'],layout:{visibility:'none'},paint:{'fill-pattern':'dots','fill-opacity':.9}});
  map.on('click','bf-vol',e=>onPick(e.features[0].id,'map'));
  map.on('mousemove','bf-vol',e=>setHover(e.features[0].id));
  map.on('mouseleave','bf-vol',()=>setHover(null));
  document.getElementById('loader').classList.add('hide');
  buildFilters();buildLayers();render();
});

let hoverId=null;
function setHover(id){if(hoverId===id)return;if(hoverId!=null)map.setFeatureState({source:'bf',id:hoverId},{hover:false});hoverId=id;if(id!=null)map.setFeatureState({source:'bf',id},{hover:true});
  map.getCanvas().style.cursor=id!=null?'pointer':'';
  document.querySelectorAll('.li').forEach(el=>el.classList.toggle('hoverx',+el.dataset.id===id));}

/* filtered set */
function visible(){return bf.features.filter(f=>{const p=f.properties;
  if(S.owner&&p.DRUH_VLA!==S.owner)return false;
  if(S.contam&&p.KONTAMIN!=='2')return false;
  if(S.big&&(p.VYMERA_HA||0)<25)return false;
  if(S.q){const q=S.q.toLowerCase();if(!((p.NAZOV||'').toLowerCase().includes(q)||(p.MC||'').toLowerCase().includes(q)))return false;}
  return true;});}

function render(){
  const vis=visible().sort((a,b)=>(b.properties.VYMERA_HA||0)-(a.properties.VYMERA_HA||0));
  const ids=vis.map(f=>f.properties.OBJECTID);
  // map filter
  const filt=['in',['get','OBJECTID'],['literal',ids]];
  map.setFilter('bf-vol',filt);map.setFilter('bf-line',filt);
  // count
  document.getElementById('cnt').textContent=vis.length;
  document.querySelector('.counthead span').innerHTML='<b id="cnt">'+vis.length+'</b> z 113 území';
  // list
  document.getElementById('list').innerHTML=vis.map(f=>{const p=f.properties;const id=p.OBJECTID;
    const sel=S.selected.includes(id),act=S.highlighted===id,pj=S.projected.has(id);
    return '<div class="li'+(act?' active':'')+(pj?' projected':'')+'" data-id="'+id+'">'+
      '<div class="cb'+(sel?' on':'')+'" data-cb="'+id+'"><svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg></div>'+
      '<span class="d" style="background:'+(OWN[p.DRUH_VLA]||C.grey)+'"></span>'+
      '<div class="t"><b>'+(p.NAZOV||'Brownfield')+'</b><span>'+(OWNL[p.DRUH_VLA]||'Iné')+' · '+(p.MC||'')+'</span><span class="cta" data-det="'+id+'">Zobraziť detail →</span></div>'+
      '<div class="ha">'+(Math.round((p.VYMERA_HA||0)*10)/10)+' ha</div>'+
      '<span class="proj">◉ na modeli</span></div>';}).join('');
  wireList();
}
function wireList(){
  document.querySelectorAll('.li').forEach(el=>{const id=+el.dataset.id;
    el.onclick=e=>{if(e.target.closest('[data-cb]')||e.target.closest('[data-det]'))return;onPick(id,'list');};
    el.onmouseenter=()=>setHover(id);el.onmouseleave=()=>setHover(null);});
  document.querySelectorAll('[data-cb]').forEach(el=>el.onclick=e=>{e.stopPropagation();toggleSel(+el.dataset.cb);});
  document.querySelectorAll('[data-det]').forEach(el=>el.onclick=e=>{e.stopPropagation();openDetail(+el.dataset.det);});
}

/* single pick = highlight (nie detail) */
function onPick(id,src){
  if(S.highlighted!=null)map.setFeatureState({source:'bf',id:S.highlighted},{active:false});
  S.highlighted=id;
  bf.features.forEach(f=>map.setFeatureState({source:'bf',id:f.properties.OBJECTID},{dim:f.properties.OBJECTID!==id}));
  map.setFeatureState({source:'bf',id},{active:true,dim:false});
  const f=get(id);map.flyTo({center:ctr(f.geometry),zoom:13.6,pitch:52,duration:800});
  render();
  // scroll list to row
  setTimeout(()=>{const row=document.querySelector('.li[data-id="'+id+'"]');if(row&&src==='map')row.scrollIntoView({block:'center',behavior:'smooth'});},60);
}
function clearHighlight(){if(S.highlighted!=null)map.setFeatureState({source:'bf',id:S.highlighted},{active:false});bf.features.forEach(f=>map.setFeatureState({source:'bf',id:f.properties.OBJECTID},{dim:false}));S.highlighted=null;}

/* výber na porovnanie */
function toggleSel(id){const i=S.selected.indexOf(id);
  if(i>=0){S.selected.splice(i,1);map.setFeatureState({source:'bf',id},{selected:false});}
  else{if(S.selected.length>=2){alert('Môžete porovnať najviac 2 územia. Najskôr jedno z výberu odstráňte.');return;}S.selected.push(id);map.setFeatureState({source:'bf',id},{selected:true});}
  const sb=document.getElementById('selbar');sb.classList.toggle('on',S.selected.length>0);document.getElementById('sel-n').textContent=S.selected.length;
  render();}
document.getElementById('sel-cmp').onclick=()=>{if(S.selected.length<2){alert('Vyber dve územia na porovnanie.');return;}
  const a=get(S.selected[0]).properties,b=get(S.selected[1]).properties;
  alert('Porovnanie (v1):\n\n'+[a,b].map(p=>p.NAZOV+' — '+(OWNL[p.DRUH_VLA])+' · '+Math.round(p.VYMERA_HA)+' ha · '+(p.KONTAMIN==='2'?'kontaminácia':'bez záťaže')).join('\n\n')+'\n\n(Plná porovnávacia obrazovka je ďalší krok.)');};

/* filtre */
function buildFilters(){const f=document.getElementById('filters');
  const owners=[['Súkromné','SÚKROMNÍ VLASTNÍCI'],['Mestské','MESTO'],['Štát','ŠTÁT']];
  f.innerHTML='<span class="chip" data-t="contam">Kontaminované</span><span class="chip" data-t="big">Nad 25 ha</span>'+
    owners.map(o=>'<span class="chip" data-owner="'+o[1]+'"><i style="background:'+OWN[o[1]]+'"></i>'+o[0]+'</span>').join('');
  f.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{
    if(c.dataset.t==='contam'){S.contam=!S.contam;c.classList.toggle('on',S.contam);}
    else if(c.dataset.t==='big'){S.big=!S.big;c.classList.toggle('on',S.big);}
    else{const o=c.dataset.owner;S.owner=S.owner===o?null:o;f.querySelectorAll('[data-owner]').forEach(x=>x.classList.toggle('on',x.dataset.owner===S.owner));}
    render();});}
document.getElementById('q').oninput=e=>{S.q=e.target.value;render();};

/* vrstvy (kontext, nie filter) */
function buildLayers(){const l=document.getElementById('layerctl');
  l.innerHTML='<button class="lbtn" data-l="contam"><i style="background:var(--warm)"></i>Env. záťaže</button>';
  l.querySelectorAll('.lbtn').forEach(b=>b.onclick=()=>{const on=map.getLayoutProperty('bf-contam','visibility')==='visible';map.setLayoutProperty('bf-contam','visibility',on?'none':'visible');b.classList.toggle('on',!on);});}

/* DETAIL */
const PHASE_DEF=p=>({
  minulost:{yr:'do 1990',h:'Priemyselná / dopravná funkcia',txt:(p.P_VYUZITIE?'Pôvodné využitie: '+p.P_VYUZITIE:'Územie slúžilo priemyslu, doprave alebo armáde.'),cert:'Doložená história'},
  dnes:{yr:'2026',h:'Nevyužívané územie'+(p.KONTAMIN==='2'?' · env. záťaž':''),txt:(p.S_VYUZITIE||p.N_FUNK_POP||'Areál je dnes nevyužívaný alebo len čiastočne využívaný.'),cert:'Aktuálny stav'},
  plan:{yr:'—',h:(p.ZAMER&&p.ZAMER!=='NEZISTENÉ'?'Evidovaný zámer':'Zatiaľ bez schváleného zámeru'),txt:(p.ZAMER&&p.ZAMER!=='NEZISTENÉ'?p.ZAMER:'Pre túto lokalitu momentálne nie je evidovaný konkrétny schválený zámer. Zobrazený potenciál vychádza z charakteru územia a plánovacích dokumentov.'),cert:(p.ZAMER&&p.ZAMER!=='NEZISTENÉ'?'Pripravovaný zámer':'Bez evidovaného zámeru')},
  vizia:{yr:'2050',h:'Možná budúca funkcia',txt:(p.POTENCIAL||p.DOP_B_VYUZ||'Zmiešaná mestská štvrť — bývanie, služby, verejný priestor a zeleň.'),cert:'Koncepčná vízia'}
});
let curPhase='dnes',curId=null;
function openDetail(id){
  S.saved={q:S.q,owner:S.owner,contam:S.contam,big:S.big,highlighted:S.highlighted,scroll:document.getElementById('list').scrollTop,center:map.getCenter(),zoom:map.getZoom(),pitch:map.getPitch(),bearing:map.getBearing()};
  curId=id;curPhase='dnes';
  onPick(id,'list');
  renderDetail();
  document.getElementById('detail').classList.add('show');
}
function renderDetail(){
  const p=get(curId).properties;const oc=OWN[p.DRUH_VLA]||C.grey;const ph=PHASE_DEF(p)[curPhase];const pj=S.projected.has(curId);
  document.getElementById('det-scroll').innerHTML=
    '<span class="det-tag" style="background:rgba(255,255,255,.08);color:'+oc+'">'+(OWNL[p.DRUH_VLA]||'Iné')+'</span>'+
    '<div class="det-name">'+(p.NAZOV||'Brownfield')+'</div>'+
    '<div class="det-sub">'+(p.MC||'')+(p.ADRESA?' · '+p.ADRESA:'')+'</div>'+
    '<button class="projbtn'+(pj?' done':'')+'" id="projbtn">'+(pj?'✓ Zobrazené na modeli':'🔦 Rozsvietiť na modeli')+'</button>'+
    '<div class="photo">📷 historická + súčasná fotografia</div>'+
    '<div class="blk"><div class="l">Identita</div><div class="kv"><span class="k">Rozloha</span><span class="vv">~'+(Math.round((p.VYMERA_HA||0)*10)/10)+' ha</span></div><div class="kv"><span class="k">Mestská časť</span><span class="vv">'+(p.MC||'—')+'</span></div></div>'+
    '<div class="blk"><div class="l">Kto drží kľúč</div><div class="v">'+(OWNL[p.DRUH_VLA]||'Iné')+'</div><p style="margin-top:5px">Kto musí byť súčasťou dohody, aby sa územie pohlo.</p></div>'+
    '<div class="blk"><div class="l">Environmentálna záťaž</div><div class="v">'+(p.KONTAMIN==='2'?'<span class="det-tag crit">Potvrdená</span>':'<span class="det-tag ok">Nezistená</span>')+'</div>'+(p.KONTAMIN==='2'?'<p style="margin-top:6px">Otrávená pôda/voda po priemyselnej výrobe. Zdroj: register environmentálnych záťaží.</p>':'')+'</div>'+
    '<div class="blk"><div class="l">Časová os územia</div>'+
      '<div class="phases" id="phases"><button data-p="minulost">Minulosť</button><button data-p="dnes">Dnes</button><button data-p="plan">Plán</button><button data-p="vizia">Vízia</button></div>'+
      '<div class="phasebox"><div class="yr">'+ph.yr+'</div><h4>'+ph.h+'</h4><p>'+ph.txt+'</p><span class="cert">'+ph.cert+'</span></div>'+
    '</div>';
  document.querySelectorAll('#phases button').forEach(b=>{b.classList.toggle('on',b.dataset.p===curPhase);b.onclick=()=>{curPhase=b.dataset.p;renderDetail();};});
  document.getElementById('projbtn').onclick=()=>{if(S.projected.has(curId)){S.projected.delete(curId);map.setFeatureState({source:'bf',id:curId},{projected:false});}else{S.projected.add(curId);map.setFeatureState({source:'bf',id:curId},{projected:true});}renderDetail();render();};
}
document.getElementById('back').onclick=()=>{
  document.getElementById('detail').classList.remove('show');
  const s=S.saved;if(s){S.q=s.q;S.owner=s.owner;S.contam=s.contam;S.big=s.big;
    document.getElementById('q').value=s.q;
    document.querySelectorAll('[data-owner]').forEach(x=>x.classList.toggle('on',x.dataset.owner===s.owner));
    document.querySelector('[data-t=contam]').classList.toggle('on',s.contam);document.querySelector('[data-t=big]').classList.toggle('on',s.big);
    map.flyTo({center:s.center,zoom:s.zoom,pitch:s.pitch,bearing:s.bearing,duration:700});
    render();setTimeout(()=>document.getElementById('list').scrollTop=s.scroll,80);}
};
</script>
</body>
</html>
